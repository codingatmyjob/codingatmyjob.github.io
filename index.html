<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Discoverability-->
    <meta name="google-site-verification" content="S7P-3avzu3M7DU8ym41_KkBhDdxsG7npKpoRa-2v400" />

    <!-- Structured favicon data -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon/android-chrome-512x512.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
        <script>
            // Recover path encoded by 404.html GitHub Pages SPA fallback
            (function () {
                var q = window.location.search;
                if (q && q.indexOf('?r=') === 0) {
                    var path = decodeURIComponent(q.slice(3));
                    window.history.replaceState(null, null, path);
                }
            })();
        </script>
        <script>
            (function () {
                try {
                    var saved = localStorage.getItem('theme')
                    var systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                    var theme = saved || (systemPrefersDark ? 'dark' : 'light')
                    document.documentElement.setAttribute('data-theme', theme)
                } catch (e) {
                    document.documentElement.setAttribute('data-theme', 'light')
                }
            })()
        </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
